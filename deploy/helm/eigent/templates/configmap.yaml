apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "eigent.fullname" . }}-config
  labels:
    {{- include "eigent.labels" . | nindent 4 }}
data:
  DB_TYPE: {{ .Values.registry.database.type | quote }}
  {{- if .Values.registry.database.url }}
  DB_URL: {{ .Values.registry.database.url | quote }}
  {{- end }}
  REGISTRY_PORT: {{ .Values.registry.service.port | quote }}
  DASHBOARD_PORT: {{ .Values.dashboard.service.port | quote }}
