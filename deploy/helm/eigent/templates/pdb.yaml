{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "eigent.fullname" . }}-registry
  labels:
    {{- include "eigent.registry.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "eigent.registry.selectorLabels" . | nindent 6 }}
{{- end }}
