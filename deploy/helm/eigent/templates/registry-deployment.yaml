apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eigent.fullname" . }}-registry
  labels:
    {{- include "eigent.registry.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.registry.replicas }}
  selector:
    matchLabels:
      {{- include "eigent.registry.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "eigent.registry.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: registry
          image: {{ .Values.registry.image }}
          ports:
            - name: http
              containerPort: {{ .Values.registry.service.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.registry.service.port | quote }}
            - name: EIGENT_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "eigent.fullname" . }}-secrets
                  key: master-key
            - name: DB_TYPE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "eigent.fullname" . }}-config
                  key: DB_TYPE
            {{- if .Values.registry.database.url }}
            - name: DB_PATH
              valueFrom:
                configMapKeyRef:
                  name: {{ include "eigent.fullname" . }}-config
                  key: DB_URL
            {{- end }}
          resources:
            {{- toYaml .Values.registry.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
