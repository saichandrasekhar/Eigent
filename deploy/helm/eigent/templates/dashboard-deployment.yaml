apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eigent.fullname" . }}-dashboard
  labels:
    {{- include "eigent.dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      {{- include "eigent.dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "eigent.dashboard.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: dashboard
          image: {{ .Values.dashboard.image }}
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.service.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.dashboard.service.port | quote }}
            - name: EIGENT_REGISTRY_URL
              value: "http://{{ include "eigent.fullname" . }}-registry:{{ .Values.registry.service.port }}"
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
