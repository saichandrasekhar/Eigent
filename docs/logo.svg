<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- Glow gradient -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <!-- Inner ring gradient -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <!-- Core gradient -->
    <linearGradient id="g3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <!-- Orbital path -->
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="256" cy="256" r="240" fill="url(#glow)"/>

  <!-- Outer orbital ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#g1)" stroke-width="1.5" stroke-dasharray="8 12" opacity="0.4"/>

  <!-- Middle orbital ring (tilted via ellipse) -->
  <ellipse cx="256" cy="256" rx="160" ry="80" fill="none" stroke="url(#g4)" stroke-width="2" transform="rotate(-25 256 256)" opacity="0.5"/>

  <!-- Second middle ring -->
  <ellipse cx="256" cy="256" rx="155" ry="85" fill="none" stroke="url(#g4)" stroke-width="1.5" transform="rotate(35 256 256)" opacity="0.35"/>

  <!-- Inner hexagonal shield shape -->
  <polygon
    points="256,116 346,166 346,266 256,316 166,266 166,166"
    fill="none"
    stroke="url(#g2)"
    stroke-width="2.5"
    stroke-linejoin="round"
    opacity="0.7"
  />

  <!-- Inner hexagon fill (subtle) -->
  <polygon
    points="256,126 340,172 340,260 256,306 172,260 172,172"
    fill="url(#g1)"
    opacity="0.08"
  />

  <!-- Core eigenstate symbol — stylized "E" made of parallel lines (eigenvalue notation) -->
  <!-- Three horizontal bars representing eigenstate/matrix -->
  <g transform="translate(256,216)" opacity="0.95">
    <!-- Top bar -->
    <rect x="-40" y="-44" width="80" height="6" rx="3" fill="url(#g3)"/>
    <!-- Middle bar (shorter, offset right — the "eigen" asymmetry) -->
    <rect x="-40" y="-10" width="56" height="6" rx="3" fill="url(#g3)"/>
    <!-- Bottom bar -->
    <rect x="-40" y="24" width="80" height="6" rx="3" fill="url(#g3)"/>
    <!-- Vertical bar (left side of E) -->
    <rect x="-40" y="-44" width="6" height="74" rx="3" fill="url(#g3)"/>
  </g>

  <!-- Orbital nodes (representing agents being observed) -->
  <!-- Node 1 - top -->
  <circle cx="256" cy="56" r="8" fill="#6366f1" opacity="0.9"/>
  <circle cx="256" cy="56" r="4" fill="#c4b5fd"/>

  <!-- Node 2 - right -->
  <circle cx="430" cy="200" r="7" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="430" cy="200" r="3.5" fill="#c4b5fd"/>

  <!-- Node 3 - bottom-right -->
  <circle cx="390" cy="370" r="6" fill="#06b6d4" opacity="0.7"/>
  <circle cx="390" cy="370" r="3" fill="#a5f3fc"/>

  <!-- Node 4 - bottom-left -->
  <circle cx="120" cy="350" r="7" fill="#6366f1" opacity="0.75"/>
  <circle cx="120" cy="350" r="3.5" fill="#c4b5fd"/>

  <!-- Node 5 - left -->
  <circle cx="82" cy="190" r="6" fill="#8b5cf6" opacity="0.7"/>
  <circle cx="82" cy="190" r="3" fill="#c4b5fd"/>

  <!-- Connection lines from nodes to center (trust threads) -->
  <line x1="256" y1="56" x2="256" y2="172" stroke="#6366f1" stroke-width="1" opacity="0.25"/>
  <line x1="430" y1="200" x2="296" y2="216" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
  <line x1="390" y1="370" x2="296" y2="260" stroke="#06b6d4" stroke-width="1" opacity="0.15"/>
  <line x1="120" y1="350" x2="216" y2="260" stroke="#6366f1" stroke-width="1" opacity="0.2"/>
  <line x1="82" y1="190" x2="216" y2="210" stroke="#8b5cf6" stroke-width="1" opacity="0.15"/>

  <!-- Wordmark -->
  <text x="256" y="420" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-weight="300" font-size="42" letter-spacing="18" fill="#e0e0f0" opacity="0.9">EIGENT</text>

  <!-- Tagline -->
  <text x="256" y="452" text-anchor="middle" font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" font-weight="300" font-size="11" letter-spacing="4" fill="#8585a8" opacity="0.7">TRUST INFRASTRUCTURE</text>
</svg>
