<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>

  <!-- Stylized E — eigenstate bars -->
  <g transform="translate(64,58)">
    <!-- Vertical bar -->
    <rect x="-28" y="-26" width="5" height="52" rx="2.5" fill="url(#accent)"/>
    <!-- Top bar -->
    <rect x="-28" y="-26" width="56" height="5" rx="2.5" fill="url(#accent)"/>
    <!-- Middle bar (shorter) -->
    <rect x="-28" y="-2" width="40" height="5" rx="2.5" fill="url(#accent)"/>
    <!-- Bottom bar -->
    <rect x="-28" y="22" width="56" height="5" rx="2.5" fill="url(#accent)"/>
  </g>

  <!-- Orbital dot (top-right) -->
  <circle cx="100" cy="28" r="6" fill="#06b6d4" opacity="0.9"/>
  <circle cx="100" cy="28" r="3" fill="#e0f7fa"/>

  <!-- Orbital arc hint -->
  <path d="M 96 34 Q 110 64 96 94" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
</svg>
